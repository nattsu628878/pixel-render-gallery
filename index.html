<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ドット絵風レンダラー — 手法・パラメータ比較</title>
<style>
  :root { --bg:#0d0f16; --card:#161a26; --line:#262c3d; --fg:#e6e9f2; --mut:#8b93a7; --acc:#ffd23e; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; line-height:1.5; }
  header { padding: 32px 20px 8px; max-width:1200px; margin:0 auto; }
  h1 { font-size: clamp(20px, 4vw, 30px); margin:0 0 6px; }
  header p { color:var(--mut); margin:4px 0; font-size:14px; }
  header .tag { color:var(--acc); }
  main { max-width:1200px; margin:0 auto; padding: 16px 20px 60px; }
  .grid { display:grid; gap:18px; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; overflow:hidden;
          display:flex; flex-direction:column; }
  .shot { width:100%; aspect-ratio:16/9; background:#000; display:block;
          image-rendering: pixelated; image-rendering: crisp-edges; }
  .meta { padding:10px 12px 12px; }
  .meta h2 { font-size:14px; margin:0 0 8px; }
  .meta h2 .idx { color:var(--mut); margin-right:6px; }
  .rows { display:grid; grid-template-columns:auto 1fr; gap:2px 10px; font-size:11.5px; }
  .rows dt { color:var(--mut); }
  .rows dd { margin:0; }
  footer { max-width:1200px; margin:0 auto; padding: 0 20px 50px; color:var(--mut); font-size:12px; }
  a { color:var(--acc); }
</style>
</head>
<body>
<header>
  <h1>ドット絵風レンダラー <span class="tag">— 手法・パラメータ比較</span></h1>
  <p>Godot 4.6 / 低解像度レンダ → トゥーン段階陰影 → パレット量子化＋Bayerディザ → ニアレスト拡大。同一シーンを17通りでレンダ。</p>
  <p>画像はブラウザで <code>image-rendering: pixelated</code> により等倍拡大（ドットがくっきり）。</p>
</header>
<main><div class="grid" id="grid"></div></main>
<footer>generated by Claude Code on Arch · Godot headless(Wayland+OpenGL) · <span id="count"></span> variations</footer>

<script>
const DATA = [
 {"file":"01_baseline.png","title":"ベースライン","res":"320x180","colors":"6段/ch","dither":"Bayer4x4 0.6","shading":"4段","outline":"なし","proj":"オルソ"},
 {"file":"02_nodither.png","title":"ディザなし","res":"320x180","colors":"6段/ch","dither":"なし","shading":"4段","outline":"なし","proj":"オルソ"},
 {"file":"03_dither_full.png","title":"ディザ最大","res":"320x180","colors":"6段/ch","dither":"Bayer4x4 1.0","shading":"4段","outline":"なし","proj":"オルソ"},
 {"file":"04_bayer2.png","title":"Bayer 2x2","res":"320x180","colors":"6段/ch","dither":"Bayer2x2 0.7","shading":"4段","outline":"なし","proj":"オルソ"},
 {"file":"05_bayer8.png","title":"Bayer 8x8","res":"320x180","colors":"6段/ch","dither":"Bayer8x8 0.7","shading":"4段","outline":"なし","proj":"オルソ"},
 {"file":"06_colors3.png","title":"色数 3段","res":"320x180","colors":"3段/ch","dither":"Bayer4x4 0.6","shading":"4段","outline":"なし","proj":"オルソ"},
 {"file":"07_colors16.png","title":"色数 16段","res":"320x180","colors":"16段/ch","dither":"Bayer4x4 0.4","shading":"4段","outline":"なし","proj":"オルソ"},
 {"file":"08_res160.png","title":"160x90 粗い","res":"160x90","colors":"6段/ch","dither":"Bayer4x4 0.6","shading":"4段","outline":"なし","proj":"オルソ"},
 {"file":"09_res480.png","title":"480x270 細かい","res":"480x270","colors":"6段/ch","dither":"Bayer4x4 0.6","shading":"4段","outline":"なし","proj":"オルソ"},
 {"file":"10_bands2.png","title":"陰影 2段","res":"320x180","colors":"6段/ch","dither":"Bayer4x4 0.6","shading":"2段","outline":"なし","proj":"オルソ"},
 {"file":"11_smooth.png","title":"陰影 なめらか","res":"320x180","colors":"6段/ch","dither":"Bayer4x4 0.6","shading":"なめらか","outline":"なし","proj":"オルソ"},
 {"file":"12_outline.png","title":"アウトライン","res":"320x180","colors":"6段/ch","dither":"Bayer4x4 0.6","shading":"4段","outline":"あり","proj":"オルソ"},
 {"file":"13_outline_lo.png","title":"アウトライン+3段","res":"320x180","colors":"3段/ch","dither":"Bayer4x4 0.5","shading":"3段","outline":"あり","proj":"オルソ"},
 {"file":"14_gameboy.png","title":"Game Boy パレット","res":"320x180","colors":"GameBoy","dither":"Bayer4x4 0.7","shading":"3段","outline":"なし","proj":"オルソ"},
 {"file":"15_cga.png","title":"CGA パレット","res":"320x180","colors":"CGA","dither":"Bayer4x4 0.7","shading":"4段","outline":"なし","proj":"オルソ"},
 {"file":"16_pico8.png","title":"PICO-8 パレット","res":"320x180","colors":"PICO-8","dither":"Bayer4x4 0.5","shading":"4段","outline":"なし","proj":"オルソ"},
 {"file":"17_perspective.png","title":"透視投影カメラ","res":"320x180","colors":"6段/ch","dither":"Bayer4x4 0.6","shading":"4段","outline":"なし","proj":"透視"}
];
const g = document.getElementById('grid');
DATA.forEach((v, i) => {
  const idx = String(i+1).padStart(2,'0');
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML =
    '<img class="shot" loading="lazy" src="img/'+v.file+'" alt="'+v.title+'">' +
    '<div class="meta"><h2><span class="idx">'+idx+'</span>'+v.title+'</h2>' +
    '<dl class="rows">' +
      '<dt>解像度</dt><dd>'+v.res+'</dd>' +
      '<dt>色</dt><dd>'+v.colors+'</dd>' +
      '<dt>ディザ</dt><dd>'+v.dither+'</dd>' +
      '<dt>陰影</dt><dd>'+v.shading+'</dd>' +
      '<dt>アウトライン</dt><dd>'+v.outline+'</dd>' +
      '<dt>投影</dt><dd>'+v.proj+'</dd>' +
    '</dl></div>';
  g.appendChild(card);
});
document.getElementById('count').textContent = DATA.length;
</script>
</body>
</html>
